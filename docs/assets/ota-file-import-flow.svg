<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560" role="img" aria-labelledby="title desc">
  <title id="title">文件导入下发业务流程图</title>
  <desc id="desc">展示文件导入任务上传设备清单后，系统解析去重、预检、识别设备所属大区，并由后端按设备所属大区自动分发。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker>
    <style>
      .bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.red{stroke:#d64545}.gray{stroke:#65758b}
      .t{fill:#172033;font:700 15px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.tag{font:700 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1320" height="560" rx="22"/>
  <text class="title" x="46" y="54">文件导入下发业务流程</text>
  <text class="sub" x="46" y="82">创建时不选择大区；设备所属大区只用于后端自动拆分和详情复盘，不作为发布拦截原因。</text>

  <rect class="node blue" x="46" y="142" width="158" height="72" rx="10"/><text class="t" x="68" y="172">选择文件导入</text><text class="d" x="68" y="196">进入策略配置</text>
  <rect class="node blue" x="244" y="142" width="166" height="72" rx="10"/><text class="t" x="266" y="172">上传设备清单</text><text class="d" x="266" y="196">CSV / Excel</text>
  <rect class="node blue" x="450" y="142" width="166" height="72" rx="10"/><text class="t" x="472" y="172">解析去重</text><text class="d" x="472" y="196">生成导入批次</text>
  <rect class="node blue" x="656" y="142" width="188" height="72" rx="10"/><text class="t" x="678" y="172">设备预检</text><text class="d" x="678" y="196">存在、版本、包可用性</text>
  <rect class="node gray" x="884" y="142" width="188" height="72" rx="10"/><text class="t" x="906" y="172">识别设备所属大区</text><text class="d" x="906" y="196">仅记录和拆分执行</text>

  <polygon class="node orange" points="210,310 298,360 210,410 122,360"/><text class="t" x="210" y="356" text-anchor="middle">有可升级?</text><text class="d" x="210" y="378" text-anchor="middle">预检结果</text>
  <rect class="node red" x="94" y="458" width="236" height="64" rx="10"/><text class="t" x="116" y="484">禁用提交</text><text class="d" x="116" y="504">全部异常或无可升级设备</text>
  <rect class="node gray" x="378" y="322" width="220" height="76" rx="10"/><text class="tag" x="400" y="348" fill="#65758b">可选</text><text class="t" x="400" y="374">策略条件项</text>
  <rect class="node green" x="646" y="322" width="180" height="76" rx="10"/><text class="t" x="668" y="352">预览发布</text><text class="d" x="668" y="376">总数、可升级、异常</text>
  <rect class="node orange" x="874" y="322" width="166" height="76" rx="10"/><text class="t" x="896" y="352">提交审批</text><text class="d" x="896" y="376">通过后执行</text>
  <rect class="node green" x="1088" y="142" width="186" height="256" rx="10"/><text class="t" x="1110" y="180">后端自动分发</text><text class="d" x="1110" y="208">按设备所属大区拆分</text><text class="d" x="1110" y="234">生成分区执行记录</text><text class="d" x="1110" y="260">下发到对应大区</text><text class="d" x="1110" y="286">详情按大区 tab 查看</text>

  <path class="arrow" d="M204 178 H244"/><path class="arrow" d="M410 178 H450"/><path class="arrow" d="M616 178 H656"/><path class="arrow" d="M844 178 H884"/><path class="arrow" d="M1072 178 H1088"/>
  <path class="arrow" d="M978 214 C978 274 210 262 210 310"/>
  <path class="dash" d="M210 410 V458"/><path class="arrow" d="M298 360 H378"/><path class="arrow" d="M598 360 H646"/><path class="arrow" d="M826 360 H874"/><path class="arrow" d="M1040 360 H1088"/>
</svg>
