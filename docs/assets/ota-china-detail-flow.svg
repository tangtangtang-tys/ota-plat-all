<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="420" viewBox="0 0 1320 420" role="img" aria-labelledby="title desc">
  <title id="title">中国区详情颗粒度查看流程图</title>
  <desc id="desc">展示切换顶部大区为中国后，从任务详情查看中国整体统计，再按子节点查看升级概览、异常分类和设备列表。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker><style>.bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei",Arial,sans-serif}.node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.gray{stroke:#65758b}.t{fill:#172033;font:700 15px "Microsoft YaHei",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei",Arial,sans-serif}.arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1320" height="420" rx="22"/>
  <text class="title" x="46" y="54">中国区详情颗粒度查看流程</text>
  <text class="sub" x="46" y="82">中国作为父级大区进入详情后，先看整体，再通过子节点定位杭州、杭州低功耗、深圳、成都、上海（宠物）等局部问题。</text>

  <rect class="node blue" x="46" y="150" width="180" height="74" rx="10"/><text class="t" x="68" y="180">顶部大区：中国</text><text class="d" x="68" y="204">列表和详情查询上下文</text>
  <rect class="node blue" x="276" y="150" width="160" height="74" rx="10"/><text class="t" x="298" y="180">进入任务详情</text><text class="d" x="298" y="204">当前任务本地结果</text>
  <rect class="node green" x="486" y="150" width="190" height="74" rx="10"/><text class="t" x="508" y="180">查看中国整体</text><text class="d" x="508" y="204">升级概览与异常分类</text>
  <rect class="node orange" x="726" y="150" width="240" height="74" rx="10"/><text class="t" x="748" y="180">选择中国子节点</text><text class="d" x="748" y="204">杭州 / 低功耗 / 深圳 / 成都 / 上海</text>
  <rect class="node green" x="1016" y="150" width="240" height="74" rx="10"/><text class="t" x="1038" y="180">查看子节点结果</text><text class="d" x="1038" y="204">概览、异常分类、设备列表</text>

  <rect class="node gray" x="486" y="286" width="230" height="62" rx="10"/><text class="t" x="508" y="312">跨大区创建口径</text><text class="d" x="508" y="334">选择“中国”覆盖全部中国子节点</text>
  <rect class="node gray" x="766" y="286" width="230" height="62" rx="10"/><text class="t" x="788" y="312">详情定位口径</text><text class="d" x="788" y="334">子节点只用于查看和问题定位</text>

  <path class="arrow" d="M226 187 H276"/><path class="arrow" d="M436 187 H486"/><path class="arrow" d="M676 187 H726"/><path class="arrow" d="M966 187 H1016"/>
  <path class="dash" d="M581 224 V286"/><path class="dash" d="M846 224 V286"/>
</svg>
