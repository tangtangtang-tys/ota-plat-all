<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="480" viewBox="0 0 1320 480" role="img" aria-labelledby="title desc">
  <title id="title">详情页分区升级明细查看流程图</title>
  <desc id="desc">展示详情页在升级明细页签顶部按大区或分发范围切换，所有概览、异常和设备列表均基于当前选中分区，不提供全部聚合。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker>
    <style>
      .bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.gray{stroke:#65758b}.red{stroke:#d64545}
      .t{fill:#172033;font:700 15px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.tag{font:700 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1320" height="480" rx="22"/>
  <text class="title" x="46" y="54">详情页分区升级明细查看流程</text>
  <text class="sub" x="46" y="82">分区查看入口放在升级明细最上方；切换 tab 后，概览、异常、设备列表和导出均跟随当前分区。</text>

  <rect class="node blue" x="46" y="146" width="176" height="76" rx="10"/><text class="t" x="68" y="176">进入任务详情</text><text class="d" x="68" y="200">默认任务概览</text>
  <rect class="node blue" x="270" y="146" width="176" height="76" rx="10"/><text class="t" x="292" y="176">打开升级明细</text><text class="d" x="292" y="200">分区 tab 位于顶部</text>
  <polygon class="node orange" points="562,128 656,184 562,240 468,184"/><text class="t" x="562" y="180" text-anchor="middle">任务策略</text><text class="d" x="562" y="202" text-anchor="middle">指定 / 文件 / 手动</text>
  <rect class="node green" x="704" y="118" width="218" height="76" rx="10"/><text class="tag" x="726" y="146" fill="#1f9d72">指定版本</text><text class="t" x="726" y="172">按分发范围 tab</text>
  <rect class="node green" x="704" y="222" width="218" height="76" rx="10"/><text class="tag" x="726" y="250" fill="#1f9d72">文件 / 手动</text><text class="t" x="726" y="276">按设备所属大区 tab</text>
  <rect class="node red" x="972" y="146" width="244" height="76" rx="10"/><text class="tag" x="994" y="174" fill="#d64545">限制</text><text class="t" x="994" y="200">不提供全部聚合 tab</text>

  <rect class="node blue" x="130" y="336" width="210" height="76" rx="10"/><text class="t" x="152" y="366">当前分区概览</text><text class="d" x="152" y="390">状态、匹配、下发、成功率</text>
  <rect class="node blue" x="390" y="336" width="210" height="76" rx="10"/><text class="t" x="412" y="366">当前分区异常</text><text class="d" x="412" y="390">仅执行态且有失败时展示</text>
  <rect class="node blue" x="650" y="336" width="210" height="76" rx="10"/><text class="t" x="672" y="366">当前分区设备列表</text><text class="d" x="672" y="390">搜索、导出、失败原因</text>
  <rect class="node gray" x="910" y="336" width="246" height="76" rx="10"/><text class="t" x="932" y="366">评审口径快速切换</text><text class="d" x="932" y="390">不修改真实任务配置</text>

  <path class="arrow" d="M222 184 H270"/><path class="arrow" d="M446 184 H468"/>
  <path class="dash" d="M656 172 H704"/><path class="dash" d="M656 198 C676 244 676 260 704 260"/>
  <path class="arrow" d="M922 156 C942 164 948 172 972 180"/><path class="arrow" d="M922 260 C948 244 954 220 972 202"/>
  <path class="arrow" d="M1094 222 C1094 300 235 288 235 336"/>
  <path class="arrow" d="M340 374 H390"/><path class="arrow" d="M600 374 H650"/><path class="arrow" d="M860 374 H910"/>
</svg>
