<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="500" viewBox="0 0 1320 500" role="img" aria-labelledby="title desc">
  <title id="title">指定版本跨大区同步任务流程图</title>
  <desc id="desc">展示指定版本跨大区同步任务从选择同步范围、统一配置、统一审批到生成各大区本地任务和按顶部大区查看详情的业务流转。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker><style>.bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei",Arial,sans-serif}.node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.gray{stroke:#65758b}.t{fill:#172033;font:700 15px "Microsoft YaHei",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei",Arial,sans-serif}.tag{font:700 12px "Microsoft YaHei",Arial,sans-serif}.arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1320" height="500" rx="22"/>
  <text class="title" x="46" y="54">指定版本：跨大区同步任务流程</text>
  <text class="sub" x="46" y="82">跨大区只在指定版本中开放；统一配置和审批后，系统生成各目标大区本地任务，列表与详情仍按顶部大区查看。</text>

  <rect class="node blue" x="46" y="154" width="160" height="74" rx="10"/><text class="t" x="68" y="184">选择指定版本</text><text class="d" x="68" y="208">策略入口</text>
  <rect class="node orange" x="246" y="154" width="210" height="74" rx="10"/><text class="t" x="268" y="184">选择跨大区同步</text><text class="d" x="268" y="208">基础信息中二选一</text>
  <rect class="node blue" x="496" y="154" width="245" height="74" rx="10"/><text class="t" x="518" y="184">勾选父级目标大区</text><text class="d" x="518" y="208">中国 / 香港 / 法兰福克 / 硅谷</text>
  <rect class="node blue" x="781" y="154" width="220" height="74" rx="10"/><text class="t" x="803" y="184">配置统一策略</text><text class="d" x="803" y="208">任务信息、版本、源版本、数量</text>
  <rect class="node blue" x="1041" y="154" width="150" height="74" rx="10"/><text class="t" x="1063" y="184">统一预览</text><text class="d" x="1063" y="208">跨区摘要</text>

  <rect class="node orange" x="246" y="318" width="180" height="74" rx="10"/><text class="t" x="268" y="348">提交统一审批</text><text class="d" x="268" y="372">通过后同步生成</text>
  <rect class="node green" x="466" y="318" width="230" height="74" rx="10"/><text class="t" x="488" y="348">生成本地任务</text><text class="d" x="488" y="372">各大区独立执行和统计</text>
  <rect class="node gray" x="736" y="318" width="230" height="74" rx="10"/><text class="t" x="758" y="348">切换顶部大区</text><text class="d" x="758" y="372">查看对应大区任务</text>
  <rect class="node green" x="1006" y="318" width="230" height="74" rx="10"/><text class="t" x="1028" y="348">详情复盘</text><text class="d" x="1028" y="372">同步批次、目标大区、本地结果</text>

  <path class="arrow" d="M206 191 H246"/><path class="arrow" d="M456 191 H496"/><path class="arrow" d="M741 191 H781"/><path class="arrow" d="M1001 191 H1041"/>
  <path class="arrow" d="M1116 228 C1116 278 336 266 336 318"/>
  <path class="arrow" d="M426 355 H466"/><path class="arrow" d="M696 355 H736"/><path class="arrow" d="M966 355 H1006"/>
  <rect class="node gray" x="46" y="318" width="160" height="74" rx="10"/><text class="tag" x="68" y="344" fill="#65758b">限制</text><text class="d" x="68" y="368">不选择中国子节点</text>
  <path class="dash" d="M618 228 C618 278 126 270 126 318"/>
</svg>
