<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="520" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">指定版本多分发范围拆分执行流程图</title>
  <desc id="desc">展示指定版本选择多个分发范围后，后端如何生成分区执行记录，并在详情页按分发范围查看概览、异常和设备列表。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker>
    <style>
      .bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.gray{stroke:#65758b}
      .t{fill:#172033;font:700 15px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.tag{font:700 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1320" height="520" rx="22"/>
  <text class="title" x="46" y="54">指定版本多分发范围拆分执行</text>
  <text class="sub" x="46" y="82">创建可多选父级大区和中国子节点；详情只按具体分发范围查看，不提供跨范围的全部聚合。</text>

  <rect class="node blue" x="46" y="150" width="210" height="78" rx="10"/><text class="t" x="68" y="180">用户选择分发范围</text><text class="d" x="68" y="204">中国、子节点、香港等</text>
  <rect class="node orange" x="306" y="150" width="226" height="78" rx="10"/><text class="t" x="328" y="180">中国父级判断</text><text class="d" x="328" y="204">选父级则覆盖全部子节点</text>
  <rect class="node blue" x="582" y="150" width="220" height="78" rx="10"/><text class="t" x="604" y="180">生成分区执行记录</text><text class="d" x="604" y="204">每个范围一条 regionExecution</text>
  <rect class="node green" x="852" y="150" width="214" height="78" rx="10"/><text class="t" x="874" y="180">分区动态匹配</text><text class="d" x="874" y="204">源版本 + 策略条件</text>
  <rect class="node green" x="1116" y="150" width="158" height="78" rx="10"/><text class="t" x="1138" y="180">分区下发</text><text class="d" x="1138" y="204">记录设备明细</text>

  <rect class="node gray" x="88" y="320" width="190" height="74" rx="10"/><text class="tag" x="110" y="346" fill="#65758b">示例</text><text class="t" x="110" y="372">中国父级</text>
  <rect class="node gray" x="318" y="320" width="226" height="74" rx="10"/><text class="t" x="340" y="350">杭州 / 深圳 / 成都</text><text class="d" x="340" y="372">按中国子节点拆分展示</text>
  <rect class="node gray" x="584" y="320" width="190" height="74" rx="10"/><text class="tag" x="606" y="346" fill="#65758b">示例</text><text class="t" x="606" y="372">香港 / 硅谷</text>
  <rect class="node gray" x="814" y="320" width="210" height="74" rx="10"/><text class="t" x="836" y="350">独立分发范围</text><text class="d" x="836" y="372">作为叶子节点处理</text>
  <rect class="node green" x="1064" y="304" width="210" height="106" rx="10"/><text class="t" x="1086" y="338">升级明细页签</text><text class="d" x="1086" y="362">顶部 tab 切换分发范围</text><text class="d" x="1086" y="384">不提供全部 tab</text>

  <path class="arrow" d="M256 189 H306"/><path class="arrow" d="M532 189 H582"/><path class="arrow" d="M802 189 H852"/><path class="arrow" d="M1066 189 H1116"/>
  <path class="dash" d="M419 228 C398 276 210 276 183 320"/><path class="dash" d="M419 228 C438 276 438 282 431 320"/>
  <path class="dash" d="M692 228 C674 276 674 282 679 320"/><path class="dash" d="M959 228 C930 276 930 282 919 320"/>
  <path class="arrow" d="M1220 228 V304"/>
</svg>
