<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560" role="img" aria-labelledby="title desc">
  <title id="title">指定版本下发业务流程图</title>
  <desc id="desc">展示指定版本任务从选择分发范围、源版本、全量或批量数量、可选策略条件，到审批、执行和按分发范围查看详情的流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8492a6"/></marker>
    <style>
      .bg{fill:#f7fafc}.title{fill:#172033;font:700 27px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.sub{fill:#536176;font:500 14px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .node{fill:#fff;stroke:#d7e0ec;stroke-width:1.4}.blue{stroke:#2f6fed}.green{stroke:#1f9d72}.orange{stroke:#c66a16}.gray{stroke:#65758b}
      .t{fill:#172033;font:700 15px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.d{fill:#536176;font:500 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}.tag{font:700 12px "Microsoft YaHei","PingFang SC",Arial,sans-serif}
      .arrow{stroke:#8492a6;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#a5afbd;stroke-width:2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1320" height="560" rx="22"/>
  <text class="title" x="46" y="54">指定版本下发业务流程</text>
  <text class="sub" x="46" y="82">创建时必须选择分发范围；支持父级大区和中国子节点；批量支持单批数量和任务最大下发数量。</text>

  <rect class="node blue" x="46" y="146" width="164" height="76" rx="10"/><text class="t" x="68" y="176">选择指定版本</text><text class="d" x="68" y="200">进入策略配置</text>
  <rect class="node blue" x="250" y="146" width="204" height="76" rx="10"/><text class="t" x="272" y="176">选择分发范围</text><text class="d" x="272" y="200">父级大区 / 中国子节点</text>
  <rect class="node blue" x="494" y="146" width="176" height="76" rx="10"/><text class="t" x="516" y="176">选择源版本</text><text class="d" x="516" y="200">可多选</text>
  <polygon class="node orange" points="774,130 868,184 774,238 680,184"/><text class="t" x="774" y="180" text-anchor="middle">数量模式</text><text class="d" x="774" y="202" text-anchor="middle">全量 / 批量</text>
  <rect class="node green" x="906" y="112" width="170" height="70" rx="10"/><text class="tag" x="928" y="138" fill="#1f9d72">全量</text><text class="t" x="928" y="164">动态匹配全部</text>
  <rect class="node orange" x="906" y="214" width="230" height="78" rx="10"/><text class="tag" x="928" y="240" fill="#c66a16">批量</text><text class="t" x="928" y="266">单批数量 + 最大下发数量</text>

  <rect class="node gray" x="46" y="348" width="242" height="80" rx="10"/><text class="tag" x="68" y="376" fill="#65758b">可选</text><text class="t" x="68" y="402">策略条件项</text><text class="d" x="68" y="424">标签、型号、渠道、客户等</text>
  <rect class="node blue" x="338" y="348" width="190" height="80" rx="10"/><text class="t" x="360" y="380">预览发布</text><text class="d" x="360" y="404">校验范围、版本、数量</text>
  <rect class="node orange" x="578" y="348" width="170" height="80" rx="10"/><text class="t" x="600" y="380">提交审批</text><text class="d" x="600" y="404">通过后进入执行</text>
  <rect class="node green" x="798" y="348" width="214" height="80" rx="10"/><text class="t" x="820" y="380">动态匹配并下发</text><text class="d" x="820" y="404">按范围、源版本、条件匹配</text>
  <rect class="node green" x="1062" y="348" width="212" height="80" rx="10"/><text class="t" x="1084" y="380">详情按范围查看</text><text class="d" x="1084" y="404">tab 切换概览和设备列表</text>

  <path class="arrow" d="M210 184 H250"/><path class="arrow" d="M454 184 H494"/><path class="arrow" d="M670 184 H680"/>
  <path class="dash" d="M868 178 H906"/><path class="dash" d="M868 198 C884 238 884 250 906 253"/>
  <path class="arrow" d="M1022 292 C1022 328 432 316 432 348"/>
  <path class="dash" d="M167 222 V348"/>
  <path class="arrow" d="M288 388 H338"/><path class="arrow" d="M528 388 H578"/><path class="arrow" d="M748 388 H798"/><path class="arrow" d="M1012 388 H1062"/>
  <text class="tag" x="928" y="322" fill="#536176">数量上限对整个任务生效</text>
</svg>
