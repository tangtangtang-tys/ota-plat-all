<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./ota-platform-prototype/" />
    <title>OTA 升级系统平台原型</title>
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        color: #1f2d3d;
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 48px));
        border: 1px solid #e3e9f2;
        border-radius: 8px;
        padding: 32px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(16, 24, 40, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        line-height: 1.35;
      }

      p {
        margin: 0 0 20px;
        color: #667085;
        font-size: 14px;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        border-radius: 6px;
        padding: 0 16px;
        color: #fff;
        background: #2f6fed;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在打开 OTA 升级系统平台原型</h1>
      <p>如果页面没有自动跳转，请点击下方按钮进入原型页面。</p>
      <a href="./ota-platform-prototype/">进入原型页面</a>
    </main>
  </body>
</html>
